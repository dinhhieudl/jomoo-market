<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jomoo Dashboard - Tư vấn sản phẩm</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="header">
  <button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
  <h1>🏠 <span>Jomoo</span> Dashboard</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm theo tên hoặc mã SAP..." />
  </div>
  <div class="search-mode">
    <button id="modeFilter" class="active" onclick="setSearchMode('filter')">📋 Lọc</button>
    <button id="modeAI" onclick="setSearchMode('ai')">🤖 Hỏi AI</button>
  </div>
  <div class="stats" id="stats">Đang tải...</div>
</div>

<!-- Keyword Panel (collapsible) -->
<div style="position:sticky;top:57px;z-index:90;">
  <button class="kw-toggle" onclick="toggleKWPanel()">
    <span class="arrow" id="kwArrow">▶</span>
    <span>💡 Từ khóa tìm kiếm AI — bấm vào để tìm nhanh</span>
  </button>
  <div class="kw-panel collapsed" id="kwPanel">
    <div class="kw-content" id="kwContent">Đang tải...</div>
  </div>
</div>

<!-- Favorites filter -->
<div class="fav-filter">
  <button id="favToggle" onclick="toggleShowFavorites()">❤️ Yêu thích</button>
  <span class="fav-count" id="favCount">0 yêu thích</span>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Thương hiệu</div>
    <ul class="cat-list" id="brandList"></ul>
    <div class="sidebar-title">Trạng thái</div>
    <div class="status-group" id="statusGroup"></div>
    <div class="sidebar-title">Danh mục sản phẩm</div>
    <ul class="cat-list" id="catList"></ul>
  </aside>

  <main class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div> Đang tải sản phẩm...</div>
  </main>
</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h2 id="detailTitle">Chi tiết sản phẩm</h2>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-content" id="detailContent">
      <div class="loading"><div class="spinner"></div> Đang tải thông tin...</div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
