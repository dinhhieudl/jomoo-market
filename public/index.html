<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jomoo Dashboard - Tư vấn sản phẩm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --text: #f1f5f9; --text2: #94a3b8; --accent: #3b82f6;
      --accent2: #2563eb; --green: #10b981; --red: #ef4444;
      --orange: #f59e0b; --border: #475569; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .search-box { flex: 1; max-width: 500px; position: relative; }
    .search-box input { width: 100%; padding: 10px 16px 10px 40px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .search-mode { display: flex; gap: 4px; margin-left: -12px; }
    .search-mode button { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .search-mode button.active { background: var(--accent); border-color: var(--accent); color: white; }
    .search-mode button:hover:not(.active) { border-color: var(--accent); color: var(--text); }
    .stats { color: var(--text2); font-size: 13px; white-space: nowrap; }

    /* AI Search Results */
    .ai-banner { background: linear-gradient(135deg, #1e3a5f, #2d1b69); border: 1px solid #4f46e5; border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; }
    .ai-banner .ai-icon { font-size: 20px; margin-right: 8px; }
    .ai-banner .ai-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
    .ai-banner .ai-meta { font-size: 12px; color: #a5b4fc; display: flex; gap: 16px; flex-wrap: wrap; }
    .ai-banner .ai-meta span { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; }
    .ai-banner .ai-explanation { font-size: 12px; color: #c7d2fe; margin-top: 8px; }
    .ai-suggestions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
    .ai-suggestions button { padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #c7d2fe; font-size: 11px; cursor: pointer; transition: all 0.2s; }
    .ai-suggestions button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }

    /* Layout */
    .layout { display: flex; height: calc(100vh - 57px); }

    /* Sidebar */
    .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
    .sidebar-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text2); letter-spacing: 1px; margin-bottom: 12px; }

    /* Status filter */
    .status-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .status-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .status-btn:hover { border-color: var(--accent); color: var(--text); }
    .status-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Category list */
    .cat-list { list-style: none; }
    .cat-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; margin-bottom: 2px; }
    .cat-item:hover { background: var(--surface2); color: var(--text); }
    .cat-item.active { background: var(--accent); color: white; }
    .cat-item .icon { font-size: 16px; width: 24px; text-align: center; }
    .cat-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-item .count { font-size: 11px; opacity: 0.6; min-width: 30px; text-align: right; }

    /* Main content */
    .main { flex: 1; overflow-y: auto; padding: 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

    /* Product card */
    .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all 0.2s; }
    .product-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .card-img { width: 100%; aspect-ratio: 5/4; object-fit: cover; background: var(--surface2); display: block; }
    .card-img.placeholder { display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--border); }
    .card-body { padding: 12px; }
    .card-name { font-size: 13px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px; }
    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card-sap { font-size: 11px; color: var(--text2); font-family: monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px; }
    .card-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .card-cat { font-size: 11px; color: var(--text2); margin-top: 6px; }

    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; padding: 16px; }
    .page-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .page-btn:hover { border-color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { color: var(--text2); font-size: 13px; }

    /* Detail Panel (overlay) */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; backdrop-filter: blur(4px); }
    .overlay.show { display: flex; align-items: stretch; justify-content: flex-end; }
    .detail-panel { width: 580px; max-width: 95vw; background: var(--surface); overflow-y: auto; border-left: 1px solid var(--border); animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    .detail-header { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); gap: 12px; }
    .detail-header h2 { flex: 1; font-size: 16px; font-weight: 700; }
    .close-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .close-btn:hover { background: var(--red); border-color: var(--red); }

    .detail-content { padding: 20px; }

    /* Image gallery */
    .gallery { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 20px; }
    .gallery::-webkit-scrollbar { height: 4px; }
    .gallery::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .gallery-img { height: 160px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: border-color 0.2s; object-fit: cover; }
    .gallery-img:hover, .gallery-img.active { border-color: var(--accent); }
    .main-image { width: 100%; max-height: 360px; object-fit: contain; border-radius: 8px; background: var(--surface2); margin-bottom: 8px; }

    /* Detail info */
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .detail-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .meta-tag { padding: 4px 10px; border-radius: 6px; font-size: 12px; background: var(--surface2); color: var(--text2); }
    .meta-tag a { color: var(--accent); text-decoration: none; }
    .meta-tag a:hover { text-decoration: underline; }

    /* Spec table */
    .spec-table { width: 100%; border-collapse: collapse; }
    .spec-table tr { border-bottom: 1px solid var(--border); }
    .spec-table td { padding: 8px 12px; font-size: 13px; vertical-align: top; }
    .spec-table td:first-child { color: var(--text2); width: 40%; white-space: nowrap; }
    .spec-table td:last-child { color: var(--text); font-weight: 500; }

    /* Attribute groups */
    .attr-group { margin-bottom: 12px; }
    .attr-group-title { font-size: 12px; font-weight: 600; color: var(--orange); margin-bottom: 6px; }
    .attr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; }
    .attr-item { display: flex; gap: 8px; font-size: 12px; padding: 4px 0; }
    .attr-name { color: var(--text2); min-width: 100px; }
    .attr-value { color: var(--text); font-weight: 500; }

    /* Configure list */
    .config-list { list-style: none; counter-reset: config; }
    .config-list li { padding: 4px 0; font-size: 13px; color: var(--text2); counter-increment: config; }
    .config-list li::before { content: counter(config) '. '; color: var(--accent); font-weight: 600; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text2); gap: 12px; }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .layout { flex-direction: column; }
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .detail-panel { width: 100%; }
      .attr-grid { grid-template-columns: 1fr; }
    }

    /* Mobile sidebar toggle */
    .mobile-toggle { display: none; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 18px; }
    @media (max-width: 768px) {
      .mobile-toggle { display: block; }
      .sidebar.open { display: block; position: fixed; left: 0; top: 57px; bottom: 0; z-index: 150; width: 280px; }
    }
  </style>
</head>
<body>

<div class="header">
  <button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
  <h1>🏠 <span>Jomoo</span> Dashboard</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm theo tên hoặc mã SAP..." />
  </div>
  <div class="search-mode">
    <button id="modeFilter" class="active" onclick="setSearchMode('filter')">📋 Lọc</button>
    <button id="modeAI" onclick="setSearchMode('ai')">🤖 Hỏi AI</button>
  </div>
  <div class="stats" id="stats">Đang tải...</div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Trạng thái</div>
    <div class="status-group" id="statusGroup"></div>
    <div class="sidebar-title">Danh mục sản phẩm</div>
    <ul class="cat-list" id="catList"></ul>
  </aside>

  <main class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div> Đang tải sản phẩm...</div>
  </main>
</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h2 id="detailTitle">Chi tiết sản phẩm</h2>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-content" id="detailContent">
      <div class="loading"><div class="spinner"></div> Đang tải thông tin...</div>
    </div>
  </div>
</div>

<script>
const API = '';
let state = {
  categories: [],
  selectedCats: [],
  selectedStatuses: [],
  searchQuery: '',
  searchMode: 'filter', // 'filter' or 'ai'
  page: 1,
  limit: 50,
  total: 0,
  products: [],
  loading: false,
  aiResult: null,
};

// Status options
const STATUSES = [
  { raw: '在市', label: 'Đang bán', color: '#10b981' },
  { raw: '已下市', label: 'Ngưng bán', color: '#9ca3af' },
  { raw: '已停产', label: 'Ngưng sản xuất', color: '#ef4444' },
  { raw: '内部在市', label: 'Nội bộ', color: '#f59e0b' },
  { raw: '项目定制', label: 'Dự án riêng', color: '#8b5cf6' },
];

// Initialize
async function init() {
  await loadCategories();
  renderStatusButtons();
  await loadProducts();

  // Search with debounce
  let debounce;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      state.searchQuery = e.target.value.trim();
      state.page = 1;
      if (state.searchMode === 'ai' && state.searchQuery) {
        loadAISearch();
      } else {
        loadProducts();
      }
    }, state.searchMode === 'ai' ? 500 : 350);
  });

  // Enter key triggers AI search immediately
  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && state.searchMode === 'ai') {
      clearTimeout(debounce);
      state.searchQuery = e.target.value.trim();
      if (state.searchQuery) loadAISearch();
    }
  });

  // Close overlay on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
  });
}

async function loadCategories() {
  try {
    const res = await fetch(`${API}/api/categories`);
    state.categories = await res.json();
    renderCategories();
  } catch (e) {
    console.error('Failed to load categories:', e);
  }
}

function renderStatusButtons() {
  const container = document.getElementById('statusGroup');
  container.innerHTML = STATUSES.map(s => `
    <button class="status-btn" data-status="${s.raw}" onclick="toggleStatus('${s.raw}')"
      style="--sc: ${s.color}">
      ${s.label}
    </button>
  `).join('');
}

function renderCategories() {
  const container = document.getElementById('catList');
  container.innerHTML = state.categories.map(c => `
    <li class="cat-item" data-cat="${c.name}" onclick="toggleCategory('${c.name}')">
      <span class="icon">${c.icon}</span>
      <span class="label">${c.nameVi}</span>
      <span class="count">${c.count}</span>
    </li>
  `).join('');
}

function toggleCategory(cat) {
  const idx = state.selectedCats.indexOf(cat);
  if (idx >= 0) state.selectedCats.splice(idx, 1);
  else state.selectedCats.push(cat);
  state.page = 1;
  updateCatUI();
  loadProducts();
}

function toggleStatus(status) {
  const idx = state.selectedStatuses.indexOf(status);
  if (idx >= 0) state.selectedStatuses.splice(idx, 1);
  else state.selectedStatuses.push(status);
  state.page = 1;
  updateStatusUI();
  loadProducts();
}

function updateCatUI() {
  document.querySelectorAll('.cat-item').forEach(el => {
    el.classList.toggle('active', state.selectedCats.includes(el.dataset.cat));
  });
}

function updateStatusUI() {
  document.querySelectorAll('.status-btn').forEach(el => {
    el.classList.toggle('active', state.selectedStatuses.includes(el.dataset.status));
  });
}

async function loadProducts() {
  if (state.loading) return;
  state.loading = true;

  const params = new URLSearchParams({ page: state.page, limit: state.limit });
  if (state.searchQuery) params.set('q', state.searchQuery);
  if (state.selectedCats.length) params.set('category', state.selectedCats.join(','));
  if (state.selectedStatuses.length) params.set('status', state.selectedStatuses.join(','));

  try {
    const res = await fetch(`${API}/api/products?${params}`);
    const data = await res.json();
    state.products = data.products;
    state.total = data.total;
    renderProducts(data);
    document.getElementById('stats').textContent = `${data.total.toLocaleString()} sản phẩm`;
  } catch (e) {
    console.error('Failed to load products:', e);
    document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="icon">❌</div><p>Lỗi tải dữ liệu</p></div>';
  }
  state.loading = false;
}

function renderProducts(data) {
  const main = document.getElementById('mainContent');

  if (data.total === 0) {
    main.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>Không tìm thấy sản phẩm nào</p></div>';
    return;
  }

  const cards = data.products.map(p => {
    const status = p.onlineStatus[0] || {};
    const imgHtml = p.cover
      ? `<img class="card-img" src="${p.cover}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img placeholder\\'>📦</div>'">`
      : '<div class="card-img placeholder">📦</div>';
    return `
      <div class="product-card" onclick="showDetail(${p.id})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-meta">
            <span class="card-sap">${p.sapCode}</span>
            ${status.label ? `<span class="card-status" style="background:${status.color}22;color:${status.color}">${status.label}</span>` : ''}
          </div>
          <div class="card-cat">${p.categoryIcon} ${p.categoryVi}</div>
        </div>
      </div>
    `;
  }).join('');

  // Pagination
  const totalPages = data.totalPages;
  let paginationHtml = '';
  if (totalPages > 1) {
    paginationHtml = `
      <div class="pagination">
        <button class="page-btn" onclick="goPage(${data.page - 1})" ${data.page <= 1 ? 'disabled' : ''}>‹ Trước</button>
        <span class="page-info">Trang ${data.page} / ${totalPages}</span>
        <button class="page-btn" onclick="goPage(${data.page + 1})" ${data.page >= totalPages ? 'disabled' : ''}>Sau ›</button>
      </div>
    `;
  }

  main.innerHTML = `<div class="product-grid">${cards}</div>${paginationHtml}`;
}

function goPage(page) {
  state.page = page;
  if (state.searchMode === 'ai') loadAISearch();
  else loadProducts();
  document.getElementById('mainContent').scrollTop = 0;
}

function setSearchMode(mode) {
  state.searchMode = mode;
  state.aiResult = null;
  document.getElementById('modeFilter').classList.toggle('active', mode === 'filter');
  document.getElementById('modeAI').classList.toggle('active', mode === 'ai');
  const input = document.getElementById('searchInput');
  input.placeholder = mode === 'ai'
    ? '🤖 Hỏi tự nhiên: "sen cây ổn định nhiệt phím đàn"...'
    : 'Tìm theo tên hoặc mã SAP...';

  if (mode === 'filter') {
    state.page = 1;
    loadProducts();
  } else if (state.searchQuery) {
    loadAISearch();
  }
}

async function loadAISearch() {
  if (state.loading) return;
  if (!state.searchQuery) return;
  state.loading = true;

  const params = new URLSearchParams({ q: state.searchQuery, limit: 20 });
  if (state.selectedStatuses.length) params.set('status', state.selectedStatuses.join(','));

  try {
    const res = await fetch(`${API}/api/ask?${params}`);
    const data = await res.json();
    state.aiResult = data;
    state.products = data.products;
    state.total = data.total;
    renderAIResults(data);
    document.getElementById('stats').textContent = `🤖 ${data.total} kết quả`;
  } catch (e) {
    console.error('AI search failed:', e);
    document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="icon">❌</div><p>Lỗi tìm kiếm AI</p></div>';
  }
  state.loading = false;
}

function renderAIResults(data) {
  const main = document.getElementById('mainContent');

  // AI explanation banner
  const parsed = data.parsed || {};
  const confidence = Math.round((parsed.confidence || 0) * 100);
  const bannerHtml = `
    <div class="ai-banner">
      <div class="ai-title"><span class="ai-icon">🤖</span> Kết quả tìm kiếm AI</div>
      <div class="ai-meta">
        <span>📊 ${data.total} sản phẩm phù hợp</span>
        <span>🎯 Độ tin cậy: ${confidence}%</span>
        ${parsed.matched?.length ? `<span>🔤 ${parsed.matched.join(', ')}</span>` : ''}
      </div>
      ${parsed.explanation ? `<div class="ai-explanation">${parsed.explanation}</div>` : ''}
      <div class="ai-suggestions">
        <span style="color:#94a3b8;font-size:11px;">Thử:</span>
        <button onclick="tryAIQuery('sen cây ổn định nhiệt')">🚿 Sen cây ổn nhiệt</button>
        <button onclick="tryAIQuery('vòi rửa bát rút kéo')">🚰 Vòi rửa bát rút kéo</button>
        <button onclick="tryAIQuery('bồn cầu thông minh')">🚽 Bồn cầu thông minh</button>
        <button onclick="tryAIQuery('sen tắm tăng áp chống cặn')">🚿 Sen tăng áp chống cặn</button>
        <button onclick="tryAIQuery('gương đèn LED')">🪞 Gương đèn LED</button>
        <button onclick="tryAIQuery('phụ kiện phòng tắm màu đen')">🖤 Phụ kiện đen</button>
      </div>
    </div>
  `;

  if (data.total === 0) {
    main.innerHTML = `
      ${bannerHtml}
      <div class="empty">
        <div class="icon">🔍</div>
        <p>Không tìm thấy sản phẩm phù hợp</p>
        <p style="font-size:13px;margin-top:8px;color:var(--text2);">Thử mô tả khác hoặc dùng bộ lọc bên trái</p>
      </div>
    `;
    return;
  }

  const cards = data.products.map(p => {
    const status = p.onlineStatus[0] || {};
    const imgHtml = p.cover
      ? `<img class="card-img" src="${p.cover}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img placeholder\\'>📦</div>'">`
      : '<div class="card-img placeholder">📦</div>';
    return `
      <div class="product-card" onclick="showDetail(${p.id})">
        ${imgHtml}
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-meta">
            <span class="card-sap">${p.sapCode}</span>
            ${status.label ? `<span class="card-status" style="background:${status.color}22;color:${status.color}">${status.label}</span>` : ''}
          </div>
          <div class="card-cat">${p.categoryIcon} ${p.categoryVi}</div>
        </div>
      </div>
    `;
  }).join('');

  main.innerHTML = `${bannerHtml}<div class="product-grid">${cards}</div>`;
}

function tryAIQuery(query) {
  document.getElementById('searchInput').value = query;
  state.searchQuery = query;
  loadAISearch();
}

async function showDetail(id) {
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('detailContent');
  const title = document.getElementById('detailTitle');

  overlay.classList.add('show');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Đang tải thông tin chi tiết...</div>';
  title.textContent = 'Đang tải...';

  try {
    const res = await fetch(`${API}/api/products/${id}`);
    const d = await res.json();

    title.textContent = d.name || `Sản phẩm #${id}`;

    // Images
    const allImages = d.images && d.images.length ? d.images : (d.cover ? [d.cover] : []);
    let galleryHtml = '';
    if (allImages.length) {
      galleryHtml = `
        <div class="detail-section">
          <img class="main-image" id="mainImg" src="${allImages[0]}" onerror="this.style.display='none'" />
          ${allImages.length > 1 ? `
            <div class="gallery">
              ${allImages.map((img, i) => `
                <img class="gallery-img ${i === 0 ? 'active' : ''}" src="${img}"
                  onclick="document.getElementById('mainImg').src=this.src;document.querySelectorAll('.gallery-img').forEach(e=>e.classList.remove('active'));this.classList.add('active')" />
              `).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    // Meta tags
    const metaTags = [];
    metaTags.push(`<span class="meta-tag">📦 ${d.sapCode}</span>`);
    if (d.jmbarcode) metaTags.push(`<span class="meta-tag">🏷️ ${d.jmbarcode}</span>`);
    if (d.categoryVi) metaTags.push(`<span class="meta-tag">${d.categoryVi}</span>`);
    metaTags.push(`<span class="meta-tag"><a href="${d.shareUrl}" target="_blank">🔗 Xem trên Jomoo</a></span>`);

    // Spec table
    let specHtml = '';
    if (d.spec) {
      const rows = d.spec.split('\n').filter(Boolean).map(line => {
        const [key, ...vals] = line.split('：');
        return `<tr><td>${key}</td><td>${vals.join('：') || '—'}</td></tr>`;
      }).join('');
      specHtml = `
        <div class="detail-section">
          <h3>📐 Thông số kỹ thuật</h3>
          <table class="spec-table">${rows}</table>
        </div>
      `;
    }

    // Configure list
    let configHtml = '';
    if (d.configure) {
      const items = d.configure.split('\n').filter(Boolean).map(line =>
        `<li>${line.replace(/^\d+、/, '')}</li>`
      ).join('');
      configHtml = `
        <div class="detail-section">
          <h3>🔧 Cấu hình sản phẩm</h3>
          <ol class="config-list">${items}</ol>
        </div>
      `;
    }

    // Attributes
    let attrHtml = '';
    if (d.attributes && d.attributes.length) {
      const groups = d.attributes
        .filter(g => g.items && g.items.length > 0)
        .map(g => {
          const groupName = g.group.replace(/^\d+_/, '');
          const items = g.items.filter(i => i.name && i.value).map(i =>
            `<div class="attr-item"><span class="attr-name">${i.name}</span><span class="attr-value">${i.value}</span></div>`
          ).join('');
          return items ? `
            <div class="attr-group">
              <div class="attr-group-title">${groupName}</div>
              <div class="attr-grid">${items}</div>
            </div>
          ` : '';
        }).join('');
      if (groups) {
        attrHtml = `
          <div class="detail-section">
            <h3>📋 Thuộc tính sản phẩm</h3>
            ${groups}
          </div>
        `;
      }
    }

    content.innerHTML = `
      ${galleryHtml}
      <div class="detail-section">
        <div class="detail-name">${d.name}</div>
        <div class="detail-meta">${metaTags.join('')}</div>
      </div>
      ${specHtml}
      ${configHtml}
      ${attrHtml}
    `;
  } catch (e) {
    console.error('Failed to load detail:', e);
    content.innerHTML = '<div class="empty"><div class="icon">❌</div><p>Không thể tải thông tin sản phẩm</p></div>';
  }
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('show');
}

// Go!
init();
</script>
</body>
</html>
