name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Sprint 1 tests (Foundation)
        run: node tests/sprint1.test.js

      - name: Run Sprint 2 tests (Features)
        run: node tests/sprint2.test.js

      - name: Run Sprint 3 tests (Polish)
        run: node tests/sprint3.test.js

      - name: Run AI Search tests
        run: node tests/test-ai-search.js
